<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AIDEO, Stats Agents IA</title>
<style>
  body { margin: 0; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif; background: #fafaf7; color: #1f262a; }
  header { background: #1f262a; padding: 16px 32px; display: flex; align-items: center; gap: 12px; }
  header .logo { width: 32px; height: 32px; border-radius: 6px; background: #fc8902; display: flex; align-items: center; justify-content: center; color: white; font-weight: 500; font-size: 16px; }
  header .brand { color: white; font-weight: 500; font-size: 16px; }
  main { max-width: 900px; margin: 0 auto; padding: 48px 32px; }
  h1 { font-size: 28px; font-weight: 500; margin: 0 0 12px 0; }
  .subtitle { font-size: 15px; color: #5f5e5a; margin: 0 0 40px 0; line-height: 1.6; }
  .clients { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 16px; }
  .client-card { background: white; border: 1px solid #e5e4dd; border-radius: 12px; padding: 24px; text-decoration: none; color: inherit; transition: border-color 0.2s; display: block; }
  .client-card:hover { border-color: #fc8902; }
  .client-card h2 { font-size: 18px; font-weight: 500; margin: 0 0 8px 0; }
  .client-card p { font-size: 13px; color: #888780; margin: 0; }
  .footer { margin-top: 64px; padding-top: 24px; border-top: 1px solid #e5e4dd; font-size: 12px; color: #9a9a95; text-align: center; }
</style>
</head>
<body>
<header>
  <div class="logo">A</div>
  <div class="brand">AIDEO, Stats Agents IA</div>
</header>
<main>
  <h1>Tableaux de bord clients</h1>
  <p class="subtitle">Suivi mensuel des agents IA en production. Données mises à jour automatiquement le 1er de chaque mois.</p>
  <div class="clients">
    <a href="/clients/the-artist-academy/" class="client-card">
      <h2>The Artist Academy</h2>
      <p>Agent IA conversationnel, déployé en production</p>
    </a>
  </div>
  <div class="footer">AIDEO, f.ruault@ai-deo.fr, www.ai-deo.fr</div>
</main>
</body>
</html>
